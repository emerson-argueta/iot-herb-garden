[env:m5stack-papers3]
platform  = espressif32
board     = m5stack-papers3
framework = arduino

; PlatformIO board definition for M5Stack Paper S3 (ESP32-S3)
; If 'm5stack-papers3' isn't in your platform index yet, update:
;   pio pkg update -g -p espressif32
; or pin a platform version that includes it:
;   platform = espressif32 @ ^6.5.0

lib_deps =
    ; M5Stack unified library (includes M5EPD / Paper S3 display driver)
    m5stack/M5Unified @ ^0.2.2
    ; MQTT
    knolleary/PubSubClient @ ^2.8
    ; JSON
    bblanchon/ArduinoJson @ ^7.0

build_flags =
    -DCORE_DEBUG_LEVEL=3     ; INFO-level logs on Serial

monitor_speed = 115200
upload_speed  = 921600
